<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorry to see you go — Extract Text from Image</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f9fafb;
      color: #111;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 100%;
      padding: 40px 40px 36px;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      background: #e0f2f1;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    h1 {
      font-size: 22px; font-weight: 800; color: #111;
      margin-bottom: 8px; letter-spacing: -0.3px;
    }
    .sub {
      font-size: 14px; color: #6b7280; margin-bottom: 28px; line-height: 1.5;
    }

    .question {
      font-size: 14px; font-weight: 600; color: #374151;
      margin-bottom: 12px; text-align: left;
    }
    .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      background: #fff;
      font-size: 13px; color: #374151;
      transition: border-color 0.15s, background 0.15s;
    }
    .option:hover { border-color: #00796B; background: #e0f2f1; }
    .option.selected { border-color: #00796B; background: #e0f2f1; color: #00796B; font-weight: 600; }
    .option input { accent-color: #00796B; flex-shrink: 0; }

    .other-input {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: #374151;
      margin-bottom: 16px; resize: none; font-family: inherit;
      outline: none; display: none;
    }
    .other-input:focus { border-color: #00796B; }

    .send-btn {
      background: #00796B; color: #fff;
      border: none; border-radius: 10px;
      padding: 12px 32px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; width: 100%;
      margin-bottom: 16px;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #00695C; }
    .send-btn:disabled { background: #b2dfdb; cursor: default; }

    .reinstall {
      font-size: 13px; color: #9ca3af;
    }
    .reinstall a {
      color: #00796B; font-weight: 600; text-decoration: none;
    }
    .reinstall a:hover { text-decoration: underline; }

    .thankyou {
      display: none;
      padding: 20px 0 4px;
    }
    .thankyou .big { font-size: 32px; margin-bottom: 8px; }
    .thankyou p { font-size: 14px; color: #6b7280; line-height: 1.6; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 128 128">
      <rect width="128" height="128" rx="22" fill="#00796B"/>
      <rect x="22" y="32" width="84" height="12" rx="6" fill="white" opacity="0.95"/>
      <rect x="22" y="58" width="64" height="12" rx="6" fill="white" opacity="0.7"/>
      <rect x="22" y="84" width="74" height="12" rx="6" fill="white" opacity="0.45"/>
    </svg>
  </div>

  <div id="form-view">
    <h1>Sorry to see you go</h1>
    <div class="sub">Your feedback helps us improve.<br>What made you uninstall?</div>

    <div class="question">What was the reason?</div>
    <div class="options" id="options">
      <label class="option">
        <input type="radio" name="reason" value="not_working"> It didn't work as expected
      </label>
      <label class="option">
        <input type="radio" name="reason" value="too_slow"> OCR was too slow
      </label>
      <label class="option">
        <input type="radio" name="reason" value="missing_language"> My language wasn't supported
      </label>
      <label class="option">
        <input type="radio" name="reason" value="found_alternative"> Found a better alternative
      </label>
      <label class="option">
        <input type="radio" name="reason" value="temp"> Just uninstalling temporarily
      </label>
      <label class="option">
        <input type="radio" name="reason" value="other"> Other
      </label>
    </div>

    <textarea class="other-input" id="other-text" rows="3" placeholder="Tell us more…"></textarea>

    <button class="send-btn" id="send-btn" disabled>Send feedback</button>

    <div class="reinstall">
      Changed your mind? <a href="https://chrome.google.com/webstore/detail/extracttext" target="_blank">Reinstall the extension</a>
    </div>
  </div>

  <div class="thankyou" id="thankyou">
    <div class="big">🙏</div>
    <h1>Thank you!</h1>
    <p style="margin-top:10px;">We read every response.<br>Your feedback helps make ExtractText better.</p>
    <div class="reinstall" style="margin-top:20px;">
      Changed your mind? <a href="https://chrome.google.com/webstore/detail/extracttext" target="_blank">Reinstall the extension</a>
    </div>
  </div>
</div>

<script>
  const options = document.querySelectorAll('.option');
  const radios = document.querySelectorAll('input[type=radio]');
  const sendBtn = document.getElementById('send-btn');
  const otherText = document.getElementById('other-text');

  radios.forEach(r => {
    r.addEventListener('change', () => {
      options.forEach(o => o.classList.remove('selected'));
      r.closest('.option').classList.add('selected');
      sendBtn.disabled = false;
      otherText.style.display = r.value === 'other' ? 'block' : 'none';
    });
  });

  sendBtn.addEventListener('click', () => {
    const selected = document.querySelector('input[name=reason]:checked');
    if (!selected) return;
    const reason = selected.value === 'other' ? ('other: ' + otherText.value) : selected.value;

    const url = `https://docs.google.com/forms/d/e/1FAIpQLSfGknHu3OfFvcTatotcPwY3rkpmnspvwzvY-VEAn7z0WQnVXg/formResponse?entry.2107590887=${encodeURIComponent(reason)}&submit=Submit`;
    fetch(url, { method: 'GET', mode: 'no-cors' }).catch(() => {});

    const tgText = `🗑 Uninstall: Extract Text from Image\nReason: ${reason}`;
    fetch(`https://api.telegram.org/bot8682951317:AAHLqapO5VUEcOWc9B533ZCD4GG5dk6ZNDg/sendMessage`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: -1004443615641, text: tgText })
    }).catch(() => {});

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('thankyou').style.display = 'block';
  });
</script>
</body>
</html>
